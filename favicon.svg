<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" class="luanda-logo">
    <defs>
        <style>
            /* Critical Layout Classes Restored */
            .luanda-logo {
                width: 100%; 
                height: 100%;
            }
            .logo-shape {
                fill: none;
                stroke: #C5A059;
                stroke-linejoin: round;
                stroke-linecap: round;
            }
            .hex-m {
                stroke-width: 6;
            }
            .l-m {
                stroke-width: 9;
            }
        </style>
    </defs>
    <g class="logo-shape">
        <!-- Hexagon Outer Shape -->
        <path class="hex-m" d="M60 10 L105 35 V85 L60 110 L15 85 V35 Z"/>
        
        <!-- Inner 'L' Shape -->
        <path class="l-m" d="M45 40 V80 H75"/>
    </g>
</svg>