<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" class="luanda-logo">
    <defs>
        <style>
            .luanda-logo {
                width: 100%; 
                height: 100%;
                filter: drop-shadow(0 0 3px rgba(197,160,89,.35));
                animation: glowPulse 5s infinite ease-in-out;
            }

            .logo-glow { 
                filter: blur(2.5px); 
            }

            .draw-path {
                stroke-dasharray: 350;
                stroke-dashoffset: 350;
                animation: drawIn 2.5s ease-out forwards;
            }

            .l-m {
                stroke-dasharray: 100;
                stroke-dashoffset: 100;
                animation: drawIn 1.5s ease-out 0.8s forwards;
            }

            .shine-pass {
                animation: logoShine 4s ease-in-out infinite;
                opacity: 0;
            }

            @keyframes drawIn { 
                to { stroke-dashoffset: 0; } 
            }
            
            @keyframes glowPulse {
                0%, 100% { filter: drop-shadow(0 0 2px rgba(197,160,89,.10)); }
                50%      { filter: drop-shadow(0 0 5px rgba(197,160,89,.20)); }
            }
            
            @keyframes logoShine {
                0%   { transform: translate(-40px,-40px); opacity: 0; }
                6%   { opacity: 0; }
                16%  { opacity: 1; }
                48%  { transform: translate(160px, 160px); opacity: 1; }
                58%  { opacity: 0; }
                100% { transform: translate(160px, 160px); opacity: 0; }
            }
        </style>
        <mask id="logoStencil">
            <path class="draw-path hex-m" d="M60 10 L105 35 V85 L60 110 L15 85 V35 Z"
                fill="none" stroke="white" stroke-width="4"
                stroke-linecap="round" stroke-linejoin="round"/>
            <path class="draw-path l-m" d="M45 40 V80 H75"
                fill="none" stroke="white" stroke-width="8"
                stroke-linecap="round" stroke-linejoin="round"/>
        </mask>
        <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%"   stop-color="rgba(255,255,255,0)"/>
            <stop offset="42%"  stop-color="rgba(255,255,255,0)"/>
            <stop offset="50%"  stop-color="#ffffff"/>
            <stop offset="54%"  stop-color="#ffe9b8"/>
            <stop offset="62%"  stop-color="rgba(255,255,255,0)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>
    </defs>
    <g class="logo-glow" opacity="0.4">
        <path d="M60 10 L105 35 V85 L60 110 L15 85 V35 Z"
            fill="none" stroke="#C5A059" stroke-width="5" stroke-linejoin="round"/>
        <path d="M45 40 V80 H75"
            fill="none" stroke="#C5A059" stroke-width="9"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g mask="url(#logoStencil)">
        <rect x="0" y="0" width="120" height="120" fill="#b89045" opacity="0.78"/>
    </g>
    <g mask="url(#logoStencil)">
        <rect class="shine-pass" x="-100" y="-100" width="320" height="320"
            fill="url(#shineGradient)"/>
    </g>
</svg>